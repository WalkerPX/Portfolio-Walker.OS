<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Walker Birchfield</title>
  <link rel="icon" href="assets/logo-w-transparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#141420;--surface:#1A1A2E;--elevated:#222240;
      --accent:#8CB4FF;--accent-dim:#6B9FFF;
      --text:#F0F4FF;--text-dim:#C0C8E0;--text-muted:#8894B0;
      --border:rgba(107,159,255,0.18);
      --font-ui:'JetBrains Mono',monospace;--font-body:'Inter',sans-serif;
      --radius-sm:6px;--radius-md:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
    
    .header{
      position:sticky;top:0;z-index:10;
      background:rgba(20,20,32,.92);backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      padding:12px 20px;
      display:flex;align-items:center;justify-content:space-between
    }
    .header h1{font-size:15px;font-weight:600;font-family:var(--font-ui);letter-spacing:.5px}
    .header h1 span{color:var(--accent)}
    .home-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 14px;border-radius:var(--radius-sm);
      border:1px solid var(--border);background:rgba(107,159,255,.06);
      color:var(--accent);font:11px/1 var(--font-ui);
      cursor:pointer;transition:all .15s ease;text-decoration:none
    }
    .home-btn:hover{background:rgba(107,159,255,.12);border-color:rgba(107,159,255,.2)}

    .content{max-width:1200px;margin:0 auto;padding:24px 20px 50px}
    .content .desc{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}

    .cat{margin-bottom:32px}
    .cat h2{
      font-size:13px;font-weight:600;font-family:var(--font-ui);
      color:var(--accent);letter-spacing:1px;text-transform:uppercase;
      margin-bottom:12px;padding-bottom:6px;
      border-bottom:1px solid var(--border)
    }
    .cat h2 .count{color:var(--text-muted);font-weight:400;font-size:10px}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:10px
    }
    .card{
      aspect-ratio:16/12;
      border-radius:var(--radius-md);
      background:var(--surface);
      border:1px solid var(--border);
      overflow:hidden;cursor:pointer;
      transition:all .2s ease;
      position:relative
    }
    .card:hover{border-color:rgba(107,159,255,.25);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
    .card img{
      width:100%;height:100%;object-fit:cover;
      display:block;transition:transform .3s ease
    }
    .card:hover img{transform:scale(1.05)}
    .card .info{
      position:absolute;bottom:0;left:0;right:0;
      padding:30px 10px 8px;
      background:linear-gradient(transparent,rgba(0,0,0,.85));
      pointer-events:none
    }
    .card .info h3{font-size:12px;font-weight:500;color:#fff;margin-bottom:1px}
    .card .info p{font-size:10px;color:rgba(255,255,255,.6);font-family:var(--font-ui)}

    /* Lightbox */
    .lb{
      position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.92);
      display:none;align-items:center;justify-content:center;
      padding:40px;
      cursor:pointer
    }
    .lb.show{display:flex}
    .lb-inner{display:flex;flex-direction:column;align-items:center;max-width:90vw;max-height:95vh;cursor:default}
    .lb-inner img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px;border:1px solid var(--border)}
    .lb-info{text-align:center;padding:12px 0 4px;width:100%}
    .lb-info h3{font-size:14px;font-weight:600;color:var(--text);font-family:var(--font-body);margin-bottom:2px}
    .lb-info p{font-size:11px;color:var(--text-dim);font-family:var(--font-ui)}
    .lb .lb-close{
      position:fixed;top:16px;right:20px;
      font:18px/1 var(--font-ui);color:var(--text-dim);
      cursor:pointer;transition:color .15s ease;
      z-index:101
    }
    .lb .lb-close:hover{color:#fff}
    .lb-nav{
      position:fixed;top:50%;transform:translateY(-50%);z-index:102;
      font-size:40px;color:rgba(255,255,255,.15);cursor:pointer;
      padding:30px 20px;transition:all .15s ease;user-select:none;
      line-height:1;font-family:var(--font-ui)
    }
    .lb-nav:hover{color:rgba(255,255,255,.6)}
    .lb-prev{left:10px}
    .lb-next{right:10px}

    .footer{
      text-align:center;padding:20px;font-size:10px;
      color:var(--text-muted);font-family:var(--font-ui);
      border-top:1px solid var(--border)
    }
    .footer a{color:var(--accent);text-decoration:none}

    @media(max-width:640px){
      .content{padding:14px 10px 30px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
      .header{padding:10px 12px}
      .header h1{font-size:13px}
      .lb{padding:16px}
    }
  </style>
</head>
<body>

<div class="header">
  <h1><span>✦</span> Creative Gallery</h1>
  <a class="home-btn" href="/">⌂ Home</a>
</div>

<div class="content" id="content">
  <p class="desc">
    A curated collection of photography, design, and creative direction work from my time at 
    <strong style="color:var(--text)">Purdue Athletics</strong> (Ross-Ade Brigade) and the 
    <strong style="color:var(--text)">Lafayette Aviators</strong>. Click any image to view full size.
  </p>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLB(event)">
  <div class="lb-inner">
    <img id="lbImg" src="" alt="" />
    <div class="lb-info">
      <h3 id="lbTitle"></h3>
      <p id="lbDesc"></p>
    </div>
  </div>
  <div class="lb-nav lb-prev" onclick="event.stopPropagation();navigate(-1)">‹</div>
  <div class="lb-nav lb-next" onclick="event.stopPropagation();navigate(1)">›</div>
  <span class="lb-close" onclick="closeLB()">✕</span>
</div>

<div class="footer">
  <a href="/">⌂ Home</a> &nbsp;·&nbsp; Walker Birchfield &nbsp;·&nbsp; © 2026
</div>

<script src="gallery-data.js"></script>
<script>
  const content = document.getElementById('content')
  // Flat array of all entries with their full paths
  const ALL_ENTRIES = []
  let lbIndex = -1
  let lbAnimating = false

  GALLERY_DATA.forEach(group => {
    const section = document.createElement('div')
    section.className = 'cat'
    section.innerHTML = `<h2>${group.label} <span class="count">— ${group.entries.length} items</span></h2>`

    const grid = document.createElement('div')
    grid.className = 'grid'

    group.entries.forEach((entry, ei) => {
      const path = `photos/${group.cat}/${entry.file}`
      const idx = ALL_ENTRIES.length
      ALL_ENTRIES.push({ path, title: entry.title, desc: entry.desc })

      const card = document.createElement('div')
      card.className = 'card'
      card.innerHTML = `
        <img src="${path}" alt="${entry.title}" loading="lazy" />
        <div class="info">
          <h3>${entry.title}</h3>
          <p>${entry.desc}</p>
        </div>
      `
      card.addEventListener('click', () => openLB(idx))
      grid.appendChild(card)
    })

    section.appendChild(grid)
    content.appendChild(section)
  })

  // Lightbox
  const lbImg = document.getElementById('lbImg')
  const lbTitle = document.getElementById('lbTitle')
  const lbDesc = document.getElementById('lbDesc')

  function openLB(idx) {
    lbIndex = idx
    const e = ALL_ENTRIES[idx]
    lbImg.style.opacity = '0'
    lbImg.src = e.path
    lbImg.alt = e.title
    lbTitle.textContent = e.title
    lbDesc.textContent = e.desc
    requestAnimationFrame(() => {
      lbImg.style.transition = 'opacity .25s ease'
      lbImg.style.opacity = '1'
    })
    document.getElementById('lb').classList.add('show')
  }

  function navigate(dir) {
    if (lbAnimating || lbIndex < 0) return
    const next = lbIndex + dir
    if (next < 0 || next >= ALL_ENTRIES.length) return
    lbAnimating = true
    lbIndex = next
    const e = ALL_ENTRIES[next]
    // Fade out
    lbImg.style.transition = 'opacity .12s ease'
    lbImg.style.opacity = '0'
    lbTitle.style.transition = 'opacity .12s ease'
    lbTitle.style.opacity = '0'
    lbDesc.style.transition = 'opacity .12s ease'
    lbDesc.style.opacity = '0'
    setTimeout(() => {
      // Swap content
      lbImg.src = e.path
      lbImg.alt = e.title
      lbTitle.textContent = e.title
      lbDesc.textContent = e.desc
      // Fade in
      lbImg.style.transition = 'opacity .2s ease'
      lbImg.style.opacity = '1'
      lbTitle.style.transition = 'opacity .2s ease'
      lbTitle.style.opacity = '1'
      lbDesc.style.transition = 'opacity .2s ease'
      lbDesc.style.opacity = '1'
      lbAnimating = false
    }, 130)
  }

  function closeLB(e) {
    if (e && e.target !== e.currentTarget) return
    document.getElementById('lb').classList.remove('show')
    lbIndex = -1
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lb')
    if (!lb.classList.contains('show')) return
    if (e.key === 'Escape') { closeLB(); return }
    if (e.key === 'ArrowRight') navigate(1)
    if (e.key === 'ArrowLeft') navigate(-1)
  })
</script>
</body>
</html>
